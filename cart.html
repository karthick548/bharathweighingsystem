<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://bharathweighingsystem.com/cart.html" />
  <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bharath Weighing System — Chennai</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-root"></div>

<section>
  <div class="section-inner">
    <div class="divider"></div>
    <h2 class="section-title">Shopping Cart</h2>
    <div id="cart-body"></div>
  </div>
</section>

<div id="footer-root"></div>

<script src="js/products.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script>
  document.getElementById('header-root').innerHTML = buildHeader('cart');
  document.getElementById('footer-root').innerHTML = buildFooter();

  function renderCartPage() {
      if (cart.length === 0) {
      document.getElementById('cart-body').innerHTML = `
        <div class="empty-cart">
          <div class="icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p style="color:var(--muted);margin-bottom:20px">Add some products to get started</p>
          <a href="products.html" class="btn-primary">Browse Products</a>
        </div>`;
      return;
    }

    const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    const rows = cart.map(item => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="cart-item-img">
              <img src="${item.img}" alt="${item.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:24px>${item.emoji}</span>'">
            </div>
            <div>
              <a href="product.html?id=${item.id}" style="font-weight:600;font-size:14px;color:var(--navy)">${item.name}</a>
            </div>
          </div>
        </td>
        <td style="font-weight:700;color:var(--red)">${item.priceStr}</td>
        <td>
          <div class="qty-control">
            <div class="qty-btn" onclick="changeQty('${item.id}', -1)">−</div>
            <div class="qty-num">${item.qty}</div>
            <div class="qty-btn" onclick="changeQty('${item.id}', 1)">+</div>
          </div>
        </td>
        <td style="font-weight:700;color:var(--navy)">₹${(item.price * item.qty).toLocaleString('en-IN')}</td>
        <td><button class="remove-btn" onclick="removeFromCart('${item.id}')">🗑</button></td>
      </tr>`).join('');

    const waItems = cart.map(i => `${i.name} x${i.qty} (${i.priceStr})`).join(', ');
    const waMsg = encodeURIComponent(`Hello, I would like to order: ${waItems}. Please confirm availability and total price.`);

    document.getElementById('cart-body').innerHTML = `
      <div class="cart-wrap">
        <div>
          <table class="cart-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
            <a href="products.html" style="background:none;border:1px solid var(--navy);color:var(--navy);padding:9px 18px;border-radius:4px;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block">← Continue Shopping</a>
            <button onclick="clearCart()" style="background:none;border:1px solid var(--red);color:var(--red);padding:9px 18px;border-radius:4px;font-size:13.5px;font-weight:600;cursor:pointer">Clear Cart</button>
          </div>
        </div>

        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Items (${cart.reduce((s,i)=>s+i.qty,0)})</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
          <div class="summary-row"><span>Shipping</span><span style="color:var(--green);font-weight:600">Contact for quote</span></div>
          <div class="summary-row" style="font-size:12px;color:var(--muted)"><span>Tax / GST</span><span>As applicable</span></div>
          <div class="summary-row summary-total"><span>Subtotal</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
          <div class="checkout-btns">
            <a class="btn-checkout wa" href="https://wa.me/${PHONE}?text=${waMsg}" target="_blank">
              ${waIcon()} Order via WhatsApp
            </a>
            <a class="btn-checkout call-order" href="tel:+${PHONE}">
              ${callIcon()} Call to Order
            </a>
          </div>
          <p style="font-size:11.5px;color:var(--muted);margin-top:12px;text-align:center">
            Contact us for final pricing, GST invoice &amp; delivery details.
          </p>
        </div>
      </div>`;
  }

  renderCartPage();
</script>
</body>
</html>
