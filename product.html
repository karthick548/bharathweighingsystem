<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://bharathscales.bharathweighingsystem.workers.dev/product.html" />

  <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details — Bharath Weighing System Chennai</title>
<meta name="description" content="View detailed specifications, price and features of weighing machines from Bharath Weighing System Chennai. Industrial quality, factory prices." />
<meta name="keywords" content="weighing machine specifications Chennai, weighing scale price details Tamil Nadu" />
<meta name="robots" content="index, follow" />
<meta name="author" content="Bharath Weighing System" />
<meta property="og:title" content="Product Details — Bharath Weighing System" />
<meta property="og:description" content="Weighing machine specifications and pricing from Bharath Weighing System Chennai." />
<meta property="og:type" content="website" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-root"></div>

<section style="background:var(--bg)">
  <div class="section-inner" id="detail-root">
    <div style="text-align:center;padding:60px 20px;color:var(--muted)">Loading product…</div>
  </div>
</section>

<div id="footer-root"></div>

<script src="js/products.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script src="js/admin.js"></script>
<script>
  document.getElementById('header-root').innerHTML = buildHeader('products');
  document.getElementById('footer-root').innerHTML = buildFooter();
  const params = new URLSearchParams(window.location.search);
  const pid = params.get('id');
  const p = getAdminProducts().find(x => x.id === pid);

  if (!p) {
    document.getElementById('detail-root').innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:48px">❌</div>
        <h2 style="color:var(--navy);margin:16px 0 8px">Product not found</h2>
        <a href="products.html" class="btn-primary">Back to Products</a>
      </div>`;
  } else {
    document.title = p.name + ' — Bharath Weighing System';

    const related = getAdminProducts().filter(x => x.cat === p.cat && x.id !== p.id).slice(0, 4);
    const waMsg = encodeURIComponent(`Hello, I am interested in ${p.name} (${p.price}). Please provide more details.`);
    const specsHTML = p.specs.map(s => `<tr><td>${s[0]}</td><td>${s[1]}</td></tr>`).join('');
    const tagsHTML = p.tags.map(t => `<span style="background:#fff8e1;color:#7a5800;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:6px;border:1px solid #f0d060">${t}</span>`).join('');
    const relatedHTML = related.map(r => productCardHTML(r)).join('');

    document.getElementById('detail-root').innerHTML = `
      <div class="breadcrumb" style="margin-bottom:20px">
        <a href="index.html">Home</a> /
        <a href="products.html">Products</a> /
        <a href="cat-${p.cat}.html">${p.catName}</a> /
        <span>${p.name}</span>
      </div>

      <div class="detail-grid">
        <!-- IMAGE COLUMN -->
        <div>
          <div class="detail-img-main">
            <img src="${p.img}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="big-emoji" style="display:none;align-items:center;justify-content:center;width:100%;height:100%">${p.emoji}</div>
          </div>
          <div class="detail-thumbs">
            <div class="detail-thumb active">${p.emoji}</div>
            <div class="detail-thumb" style="font-size:11px;color:var(--muted);padding:4px;text-align:center">Front View</div>
            <div class="detail-thumb" style="font-size:11px;color:var(--muted);padding:4px;text-align:center">Side View</div>
            <div class="detail-thumb" style="font-size:11px;color:var(--muted);padding:4px;text-align:center">Detail</div>
          </div>
        </div>

        <!-- INFO COLUMN -->
        <div class="detail-info">
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">${p.catName}</div>
          <h1 style="font-family:var(--font-head);font-size:28px;color:var(--navy);line-height:1.3;margin-bottom:12px">${p.name}</h1>
          ${tagsHTML}

          <div class="price-box">
            <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Price (approx.)</div>
            <div>
              <span class="detail-price">${p.price}</span>
              <span class="detail-original">${p.originalPrice}</span>
              <span class="detail-badge">Get Latest Price</span>
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:6px">* Call or WhatsApp for bulk discounts &amp; exact pricing</div>
          </div>

          <p style="color:var(--muted);font-size:14.5px;line-height:1.7;margin-bottom:18px">${p.desc}</p>

          <div class="detail-actions">

            <a class="btn-lg btn-wa-detail" href="https://wa.me/${PHONE}?text=${waMsg}" target="_blank">
              ${waIcon()} WhatsApp Enquiry
            </a>
            <a class="btn-lg btn-call-detail" href="tel:+${PHONE}">
              ${callIcon()} Call Now
            </a>
          </div>

          <h3 style="font-size:16px;font-weight:700;color:var(--navy);margin:26px 0 12px;padding-top:20px;border-top:1px solid var(--border)">
            Specifications
          </h3>
          <table class="spec-table">
            <tbody>${specsHTML}</tbody>
          </table>
        </div>
      </div>

      <!-- ★ RATINGS & REVIEWS SECTION ★ -->
      <div id="ratings-section" style="margin-top:54px">
        <div class="divider"></div>
        <h2 class="section-title">Customer Ratings &amp; Reviews</h2>

        <!-- Rating Summary Box -->
        <div id="rating-summary" style="display:flex;align-items:center;gap:32px;background:#f9f9fb;border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin-bottom:32px;flex-wrap:wrap">
          <div style="text-align:center;min-width:90px">
            <div id="avg-score" style="font-size:52px;font-weight:800;color:var(--navy);line-height:1">—</div>
            <div id="avg-stars" style="font-size:22px;color:#f5a623;margin:4px 0">☆☆☆☆☆</div>
            <div id="avg-count" style="font-size:13px;color:var(--muted)">0 reviews</div>
          </div>
          <div id="rating-bars" style="flex:1;min-width:180px"></div>
        </div>

        <!-- Submit Rating Form -->
        <div style="background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px 28px;margin-bottom:32px">
          <h3 style="font-size:16px;font-weight:700;color:var(--navy);margin:0 0 18px">Write a Review</h3>
          <div style="margin-bottom:14px">
            <div style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:8px">Your Rating *</div>
            <div id="star-picker" style="display:flex;gap:6px;font-size:32px;cursor:pointer">
              <span data-v="1" class="star-pick">☆</span>
              <span data-v="2" class="star-pick">☆</span>
              <span data-v="3" class="star-pick">☆</span>
              <span data-v="4" class="star-pick">☆</span>
              <span data-v="5" class="star-pick">☆</span>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
            <div>
              <label style="font-size:13px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Your Name *</label>
              <input id="r-name" type="text" placeholder="e.g. Ravi Kumar" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;box-sizing:border-box">
            </div>
            <div>
              <label style="font-size:13px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Phone (optional)</label>
              <input id="r-phone" type="tel" placeholder="+91 98765 43210" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;box-sizing:border-box">
            </div>
          </div>
          <div style="margin-bottom:16px">
            <label style="font-size:13px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px">Review (optional)</label>
            <textarea id="r-comment" rows="3" placeholder="Share your experience with this product…" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical;box-sizing:border-box"></textarea>
          </div>
          <button id="submit-rating-btn" onclick="submitRating('${pid}')"
            style="background:var(--navy);color:#fff;border:none;padding:11px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s">
            ★ Submit Review
          </button>
          <div id="rating-msg" style="margin-top:10px;font-size:14px;font-weight:600"></div>
        </div>

        <!-- Reviews List -->
        <div id="reviews-list"></div>
      </div>

      ${related.length ? `
        <div style="margin-top:54px">
          <div class="divider"></div>
          <h2 class="section-title">Related Products</h2>
          <div class="related-grid">${relatedHTML}</div>
        </div>` : ''}
    `;

    // Load ratings after rendering
    loadRatings(pid);
  }
</script>

<script>
/* ══ RATING SYSTEM ══ */
let selectedStar = 0;

// Star picker interaction
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('star-pick')) {
    selectedStar = parseInt(e.target.getAttribute('data-v'));
    updateStarPicker(selectedStar);
  }
});
document.addEventListener('mouseover', function(e) {
  if (e.target.classList.contains('star-pick')) {
    updateStarPicker(parseInt(e.target.getAttribute('data-v')));
  }
});
document.addEventListener('mouseout', function(e) {
  if (e.target.classList.contains('star-pick')) {
    updateStarPicker(selectedStar);
  }
});

function updateStarPicker(n) {
  document.querySelectorAll('.star-pick').forEach((s, i) => {
    s.textContent = i < n ? '★' : '☆';
    s.style.color = i < n ? '#f5a623' : '#ccc';
  });
}

async function submitRating(productId) {
  const name    = document.getElementById('r-name').value.trim();
  const phone   = document.getElementById('r-phone').value.trim();
  const comment = document.getElementById('r-comment').value.trim();
  const msgEl   = document.getElementById('rating-msg');
  const btn     = document.getElementById('submit-rating-btn');

  if (!name) { msgEl.style.color='#c0392b'; msgEl.textContent='⚠ Please enter your name.'; return; }
  if (!selectedStar) { msgEl.style.color='#c0392b'; msgEl.textContent='⚠ Please select a star rating.'; return; }

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  msgEl.textContent = '';

  try {
    await SB.insert('ratings', {
      product_id: productId,
      reviewer_name: name,
      reviewer_phone: phone || null,
      rating: selectedStar,
      comment: comment || null
    }, null);

    msgEl.style.color = '#27ae60';
    msgEl.textContent = '✅ Thank you! Your review has been submitted.';
    document.getElementById('r-name').value = '';
    document.getElementById('r-phone').value = '';
    document.getElementById('r-comment').value = '';
    selectedStar = 0;
    updateStarPicker(0);
    btn.textContent = '★ Submit Review';
    btn.disabled = false;
    loadRatings(productId);
  } catch(err) {
    msgEl.style.color = '#c0392b';
    msgEl.textContent = '❌ Failed to submit. Please try again.';
    btn.textContent = '★ Submit Review';
    btn.disabled = false;
  }
}

async function loadRatings(productId) {
  try {
    const rows = await SB.select('ratings', null, `select=*&product_id=eq.${productId}`);
    renderRatings(rows || []);
  } catch(e) {
    // Try localStorage fallback
    const key = 'bws_ratings_' + productId;
    const local = JSON.parse(localStorage.getItem(key) || '[]');
    renderRatings(local);
  }
}

function renderRatings(rows) {
  const total = rows.length;
  const avg = total ? (rows.reduce((s,r) => s + r.rating, 0) / total) : 0;

  // Update summary
  document.getElementById('avg-score').textContent = total ? avg.toFixed(1) : '—';
  document.getElementById('avg-stars').textContent = starsDisplay(Math.round(avg));
  document.getElementById('avg-count').textContent = total + ' review' + (total !== 1 ? 's' : '');

  // Bar chart
  const counts = [5,4,3,2,1].map(n => ({ n, c: rows.filter(r => r.rating === n).length }));
  document.getElementById('rating-bars').innerHTML = counts.map(({n,c}) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <span style="font-size:13px;color:var(--navy);min-width:14px">${n}</span>
      <span style="color:#f5a623;font-size:13px">★</span>
      <div style="flex:1;background:#eee;border-radius:4px;height:8px;overflow:hidden">
        <div style="width:${total ? Math.round(c/total*100) : 0}%;background:#f5a623;height:100%;border-radius:4px;transition:width .4s"></div>
      </div>
      <span style="font-size:12px;color:var(--muted);min-width:20px">${c}</span>
    </div>`).join('');

  // Reviews list
  const listEl = document.getElementById('reviews-list');
  if (!total) { listEl.innerHTML = '<p style="color:var(--muted);font-size:14px">No reviews yet. Be the first to review!</p>'; return; }
  listEl.innerHTML = rows.slice().reverse().map(r => `
    <div style="border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:14px;background:#fff">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <strong style="color:var(--navy);font-size:15px">${escHtml(r.reviewer_name)}</strong>
        <span style="color:#f5a623;font-size:17px">${starsDisplay(r.rating)}</span>
      </div>
      ${r.comment ? `<p style="color:var(--muted);font-size:14px;margin:0;line-height:1.6">${escHtml(r.comment)}</p>` : ''}
      <div style="font-size:11px;color:#bbb;margin-top:6px">${r.created_at ? new Date(r.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : ''}</div>
    </div>`).join('');
}

function starsDisplay(n) {
  return '★'.repeat(Math.max(0,Math.min(5,n))) + '☆'.repeat(5 - Math.max(0,Math.min(5,n)));
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
