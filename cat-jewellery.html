<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="canonical" href="https://bharathscales.bharathweighingsystem.workers.dev/cat-jewellery.html" />
  <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewellery Scales — Bharath Weighing System Chennai</title>
<meta name="description" content="Precision jewellery weighing scales from Bharath Weighing System Chennai. Accurate gold and silver weighing machines for jewellery shops across Tamil Nadu." />
<meta name="keywords" content="jewellery scale Chennai, gold weighing machine Tamil Nadu, precision jewellery balance manufacturer" />
<meta name="robots" content="index, follow" />
<meta name="author" content="Bharath Weighing System" />
<meta property="og:title" content="Jewellery Scales — Bharath Weighing System Chennai" />
<meta property="og:description" content="Precision gold and silver weighing scales for jewellery shops. Chennai manufacturer." />
<meta property="og:type" content="website" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-root"></div>
<div id="cat-header"></div>
<section style="background:var(--bg)">
  <div class="section-inner">
    <p id="count-label" style="color:var(--muted);font-size:13.5px;margin-bottom:20px"></p>
    <div class="products-grid" id="cat-grid"></div>
  </div>
</section>
<div id="footer-root"></div>
<script src="js/products.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script src="js/admin.js"></script>
<script>
  const CAT_KEY = document.location.pathname.split('/').pop().replace('cat-','').replace('.html','');
  const meta = CAT_META[CAT_KEY];
  document.title = (meta ? meta.name : 'Category') + ' — Bharath Weighing System';
  document.getElementById('header-root').innerHTML = buildHeader(CAT_KEY);
  document.getElementById('footer-root').innerHTML = buildFooter();
  if (meta) {
    document.getElementById('cat-header').innerHTML = `
      <div class="cat-page-header">
        <div class="inner">
          <div class="breadcrumb"><a href="index.html">Home</a> / <a href="products.html">Products</a> / ${meta.name}</div>
          <h1>${meta.icon} ${meta.name}</h1>
          <p>${meta.desc}</p>
        </div>
      </div>`;
  }
  const items = getAdminProducts().filter(p => p.cat === CAT_KEY);
  document.getElementById('count-label').textContent = `${items.length} product${items.length!==1?'s':''} found`;
  document.getElementById('cat-grid').innerHTML = items.map(productCardHTML).join('');
</script>
</body>
</html>
